spring:
  security:
    oauth2:
      client:
        registration:
          google:
            # Make these optional so the app can start even without a .env file
            # (OAuth2 login will simply not work until values are provided).
            client-id: ${GOOGLE_CLIENT_ID:none}
            client-secret: ${GOOGLE_CLIENT_SECRET:none}
            scope:
              - email
              - profile
